services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.11.1
    container_name: vrce-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      mlflow server
      --host 0.0.0.0
      --backend-store-uri file:/mlruns
      --serve-artifacts
      --artifacts-destination /mlruns/artifacts
      --allowed-hosts "*"
      --cors-allowed-origins "http://localhost:5000,http://127.0.0.1:5000"

  training:
    build: ./training
    container_name: vrce-training
    volumes:
      - ./models:/app/models
      - ./training/data:/app/data
      - ./mlruns:/app/mlruns
      - ./monitoring:/app/monitoring
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow

  inference:
    build: ./inference
    container_name: vrce-inference
    ports:
      - "3000:3000"
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
    depends_on:
      - training

  retrainer:
    image: python:3.11
    container_name: vrce-retrainer
    volumes:
      - ./:/app
    working_dir: /app
    command: python monitoring/retrainer.py
    depends_on:
      - inference

  prometheus:
    image: prom/prometheus:latest
    container_name: vrce-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - inference

  grafana:
    image: grafana/grafana:latest
    container_name: vrce-grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
